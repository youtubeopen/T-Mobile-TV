<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T-Mobile TV</title>

<link href="https://vjs.zencdn.net/8.16.1/video-js.css" rel="stylesheet">
<script src="https://vjs.zencdn.net/8.16.1/video.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#ffffff,#f3f3f3);
    color:#222;
    padding:20px;
}

.dashboard{
    max-width:1400px;
    margin:auto;
}

.topbar{
    display:flex;
    align-items:center;
    padding-bottom:15px;
    margin-bottom:20px;
    border-bottom:2px solid #e20074;
}

.logo{
    height:80px;
}

.container{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.player{
    position:relative;
    flex:3;
    min-width:700px;
    background:#fff;
    padding:15px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(226,0,116,.15);
}

.video-js{
    width:100%;
    height:500px;
    border-radius:12px;
    overflow:hidden;
}

.overlay{
    position:absolute;
    inset:15px;
    background:rgba(0,0,0,0.85);
    color:white;
    display:none;
    align-items:center;
    justify-content:center;
    font-size:30px;
    border-radius:12px;
    z-index:10;
}

.sidebar{
    width:350px;
}

.channels{
    background:#fff;
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 15px rgba(0,0,0,.08);
}

.channels h2{
    color:#e20074;
    margin-bottom:15px;
}

.channel{
    background:#f5f5f5;
    padding:15px;
    border-radius:12px;
    cursor:pointer;
    transition:.3s;
}

.channel:hover{
    background:#e20074;
    color:white;
}
</style>
</head>
<body>

<div class="dashboard">
    <div class="topbar">
        <img src="https://i.ibb.co/SX50Dcr2/Captura-de-tela-2026-06-14-142641-removebg-preview.png" class="logo" alt="T-Mobile TV">
    </div>

    <div class="container">
        <div class="player">
            <div class="overlay" id="overlay">Trocando de canal...</div>

            <video
                id="my-video"
                class="video-js vjs-default-skin"
                controls
                autoplay
                preload="auto"
                data-setup="{}">
            </video>
        </div>

        <div class="sidebar">
            <div class="channels">
                <h2>Canais</h2>
                <div class="channel" onclick="changeChannel()">
                    001 • NickOnline
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const overlay = document.getElementById("overlay");

const player = videojs('my-video', {
    autoplay: true,
    controls: true,
    responsive: true,
    fluid: false
});

function loadChannel() {
    player.src({
        src: "https://x1co.com.br/hls/stream.m3u8",
        type: "application/x-mpegURL"
    });
    player.play();
}

function changeChannel(){
    overlay.style.display = "flex";

    setTimeout(() => {
        loadChannel();
        overlay.style.display = "none";
    }, 1500);
}

loadChannel();
</script>

</body>
</html>
