<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T-Mobile TV</title>

<link href="https://vjs.zencdn.net/8.16.1/video-js.css" rel="stylesheet">
<script src="https://vjs.zencdn.net/8.16.1/video.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#0a0a0a,#1a0012,#2b0020);
    color:#f5f5f5;
    padding:20px;
}

.dashboard{
    max-width:1400px;
    margin:auto;
}

.topbar{
    display:flex;
    align-items:center;
    padding-bottom:15px;
    margin-bottom:20px;
    border-bottom:2px solid #e20074;
}

.logo{
    height:95px;
    width:auto;
}

.container{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.player{
    position:relative;
    flex:3;
    min-width:700px;
    background:#121212;
    padding:15px;
    border-radius:20px;
    box-shadow:0 0 25px rgba(226,0,116,.25);
}

.video-wrapper{
    position:relative;
    width:100%;
    aspect-ratio:16/9;
}

.video-js{
    width:100% !important;
    height:100% !important;
    border-radius:12px;
    overflow:hidden;
}

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.90);
    color:white;
    display:none;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-size:30px;
    border-radius:12px;
    z-index:10;
    padding:20px;
}

.sidebar{
    width:350px;
}

.channels{
    background:#121212;
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(226,0,116,.20);
}

.channels h2{
    color:#ff2fa0;
    margin-bottom:15px;
}

.channel{
    background:#1f1f1f;
    color:white;
    padding:15px;
    border-radius:12px;
    cursor:pointer;
    transition:.3s;
    margin-bottom:10px;
}

.channel:hover{
    background:#e20074;
    color:white;
    transform:translateX(4px);
}
</style>
</head>
<body>

<div class="dashboard">
    <div class="topbar">
        <img src="https://i.ibb.co/xKGWm7nr/Captura-de-tela-2026-06-21-145934-removebg-preview.png" class="logo" alt="T-Mobile TV">
    </div>

    <div class="container">
        <div class="player">
            <div class="video-wrapper">
                <div class="overlay" id="overlay">Trocando de canal...</div>
                <div class="overlay" id="offlineOverlay">
                    Canal temporariamente indisponível
                </div>

                <video
                    id="my-video"
                    class="video-js vjs-default-skin"
                    controls
                    autoplay
                    preload="auto">
                </video>
            </div>
        </div>

        <div class="sidebar">
            <div class="channels">
                <h2>Canais</h2>

                <div class="channel" onclick="changeChannel('nickonline')">
                    001 • NickOnline
                </div>

                <div class="channel" onclick="changeChannel('ntoons')">
                    002 • NToons Brasil
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const overlay = document.getElementById("overlay");
const offlineOverlay = document.getElementById("offlineOverlay");

const channels = {
    nickonline: "https://x1co.com.br/hls/stream.m3u8",
    ntoons: "https://stmv2.srvif.com/nicktoons/nicktoons/playlist.m3u8"
};

const player = videojs('my-video', {
    autoplay: true,
    controls: true
});

function loadChannel(url) {
    player.src({
        src: url,
        type: "application/x-mpegURL"
    });

    player.play().catch(() => {
        offlineOverlay.style.display = "flex";
    });
}

function changeChannel(channelName){
    overlay.style.display = "flex";
    offlineOverlay.style.display = "none";

    setTimeout(() => {
        loadChannel(channels[channelName]);
        overlay.style.display = "none";
    }, 1500);
}

player.on('ended', function () {
    offlineOverlay.style.display = "flex";
});

player.on('error', function () {
    offlineOverlay.style.display = "flex";
});

loadChannel(channels.nickonline);
</script>

</body>
</html>
