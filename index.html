<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T-Mobile TV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#ffffff,#f3f3f3);
    color:#222;
    padding:20px;
}

.dashboard{
    max-width:1400px;
    margin:auto;
}

.topbar{
    display:flex;
    align-items:center;
    padding-bottom:15px;
    margin-bottom:20px;
    border-bottom:2px solid #e20074;
}

.logo{
    height:80px;
    width:auto;
}

.container{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.player{
    flex:3;
    min-width:700px;
    background:#fff;
    padding:15px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(226,0,116,.15);
}

video{
    width:100%;
    border-radius:12px;
    background:black;
}

.sidebar{
    width:350px;
}

.channels{
    background:#fff;
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 15px rgba(0,0,0,.08);
}

.channels h2{
    color:#e20074;
    margin-bottom:15px;
}

.channel{
    background:#f5f5f5;
    padding:15px;
    border-radius:12px;
}

.warning{
    font-size:13px;
    margin-top:8px;
    color:#777;
}

@media(max-width:1100px){
    .player{
        min-width:100%;
    }

    .sidebar{
        width:100%;
    }
}
</style>
</head>
<body>

<div class="dashboard">
    <div class="topbar">
        <img src="https://i.ibb.co/SX50Dcr2/Captura-de-tela-2026-06-14-142641-removebg-preview.png" class="logo" alt="T-Mobile TV">
    </div>

    <div class="container">
        <div class="player">
            <video id="video" controls autoplay></video>
        </div>

        <div class="sidebar">
            <div class="channels">
                <h2>Canais</h2>
                <div class="channel">
                    001 • NickOnline
                    <div class="warning">⚠ A stream pode travar</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const video = document.getElementById('video');
const videoSrc = 'https://x1co.com.br/hls/stream.m3u8';

if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(videoSrc);
    hls.attachMedia(video);
} else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = videoSrc;
}
</script>

</body>
</html>
